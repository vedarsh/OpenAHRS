name: Build STM32 Firmware

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # If you have submodules
      
      - name: Build STM32CubeIDE Project
        uses: xanderhendriks/action-build-stm32cubeide@v10.0
        with:
          project-path: '.'
          project-target: 'ICM45686_Driver/Debug'  # Replace with your project name
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            Debug/*.elf
            Debug/*.bin
            Debug/*.hex
            Debug/*.map
          retention-days: 30
